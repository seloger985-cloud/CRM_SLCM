<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Se Loger CM — Control Panel</title>
  <link rel="stylesheet" href="../assets/css/control-panel.css" />
</head>
<body class="slcp-page">

  <header class="slcp-header">
    <div>
      <p class="slcp-kicker">Se Loger CM</p>
      <h1>Control Panel</h1>
    </div>
    <button class="slcp-primary-btn" type="button" onclick="openForm()">+ Nouvelle demande</button>
  </header>

  <main class="slcp-main">
    <section class="slcp-stats" aria-label="Résumé des demandes">
      <div class="slcp-stat-card">
        <span>Nouveau</span>
        <strong id="stat-nouveau">0</strong>
      </div>
      <div class="slcp-stat-card">
        <span>En cours</span>
        <strong id="stat-en_cours">0</strong>
      </div>
      <div class="slcp-stat-card">
        <span>Visite</span>
        <strong id="stat-visite">0</strong>
      </div>
      <div class="slcp-stat-card">
        <span>Négociation</span>
        <strong id="stat-negociation">0</strong>
      </div>
    </section>

    <section class="slcp-board" aria-label="Pipeline des demandes">
      <div class="slcp-column" id="nouveau"><h2>Nouveau</h2></div>
      <div class="slcp-column" id="en_cours"><h2>En cours</h2></div>
      <div class="slcp-column" id="visite"><h2>Visite</h2></div>
      <div class="slcp-column" id="negociation"><h2>Négociation</h2></div>
      <div class="slcp-column" id="conclu"><h2>Conclu</h2></div>
    </section>
  </main>

  <div class="slcp-modal" id="modal" aria-hidden="true">
    <div class="slcp-modal-content" role="dialog" aria-modal="true" aria-labelledby="slcp-modal-title">
      <div class="slcp-modal-head">
        <h3 id="slcp-modal-title">Nouvelle demande</h3>
        <button class="slcp-close-btn" type="button" onclick="closeForm()">×</button>
      </div>

      <div class="slcp-form-grid">
        <input id="name" placeholder="Nom" />
        <input id="phone" placeholder="Téléphone" />
        <input id="zone" placeholder="Zone" />
        <input id="budget" placeholder="Budget" />
        <input id="type" placeholder="Type : location, achat, vente" />
        <textarea id="notes" placeholder="Notes"></textarea>
      </div>

      <div class="slcp-modal-actions">
        <button class="slcp-primary-btn" type="button" onclick="addLead()">Ajouter</button>
        <button class="slcp-secondary-btn" type="button" onclick="closeForm()">Fermer</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="../assets/js/control-panel.js"></script>
</body>
  
</body>
</html>
